<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Менеджер списка дел</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Менеджер списка дел</h1>

<form action="/add" method="post">
    <input type="text" name="title" placeholder="Введите задачу" required>
    <button type="submit">Добавить</button>
</form>

<ol>
{% for task in tasks %}
<li>

{% if task.completed %}
<s>{{ task.title }}</s>
{% else %}
{{ task.title }}
{% endif %}

<a href="/complete/{{ task.id }}">✓</a>

<a href="/delete/{{ task.id }}">🗑</a>

</li>
{% endfor %}
</ol>

</body>
</html>
